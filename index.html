<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta http-equiv="refresh" content="120">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>דשבורד פרודוקציות ביטוח</title>
<style>
:root {
  --bg:      #080a0f;
  --surface: #0e1117;
  --surface2:#141820;
  --border:  #1e2330;
  --border2: #252c3a;
  --text:    #e8eaf0;
  --muted:   #7c8498;
  --dim:     #4a5168;
  --success: #22c55e;
  --error:   #f87171;
  --warning: #fbbf24;
  --info:    #60a5fa;
}
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html, body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Segoe UI', Arial, sans-serif;
  font-size: 13px;
}
#app {
  display: flex;
  flex-direction: column;
  height: 100vh;
  padding: 10px 14px 8px;
  gap: 8px;
}
header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-shrink: 0;
  border-bottom: 1px solid var(--border2);
  padding-bottom: 7px;
}
h1 { font-size: 1.05rem; font-weight: 700; color: var(--text); }
.hdr-right { color: var(--muted); font-size: 0.75rem; display:flex; align-items:center; gap:12px; }
.refresh-note { font-size:0.7rem; color:var(--dim); }
#tbl-wrap { flex:1; overflow:hidden; }
table { width:100%; border-collapse:collapse; table-layout:fixed; }
col.label-col { width:130px; }
col.data-col  { width:calc((100% - 130px) / 5); }
thead th {
  padding:12px 14px; font-size:0.88rem; font-weight:700;
  border-bottom:1px solid var(--border2); white-space:nowrap;
  background: var(--surface2);
}
thead th.label-th { text-align:right; color:var(--muted); font-weight:400; font-size:0.72rem; background:var(--bg); border-bottom:1px solid var(--border2); }
.th-inner { display:flex; flex-direction:column; align-items:flex-start; gap:4px; }
.company-dot { width:10px; height:10px; border-radius:50%; display:inline-block; margin-left:7px; }
.th-name { display:flex; align-items:center; font-size:1rem; font-weight:800; }
.th-url  { font-size:0.65rem; color:var(--muted); font-weight:400; }
tbody tr { border-bottom:1px solid var(--border); }
tbody tr:hover { background:rgba(255,255,255,0.025); }
td { padding:6px 14px; vertical-align:middle; line-height:1.35; }
td.label { color:var(--muted); font-size:0.72rem; white-space:nowrap; text-align:right; padding-right:4px; }
tr.sec { background: var(--surface2) !important; border-top:1px solid var(--border2) !important; border-bottom:1px solid var(--border2) !important; }
tr.sec td { font-size:0.68rem; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; color:var(--dim); padding:5px 14px; }
.badge { display:inline-block; padding:3px 10px; border-radius:10px; font-size:0.75rem; font-weight:700; white-space:nowrap; }
.COMPLETE { background:rgba(34,197,94,.12);  color:var(--success); border:1px solid rgba(34,197,94,.35); }
.PARTIAL  { background:rgba(251,191,36,.12); color:var(--warning); border:1px solid rgba(251,191,36,.35); }
.ERROR    { background:rgba(248,113,113,.12);color:var(--error);   border:1px solid rgba(248,113,113,.35); }
.PENDING  { background:rgba(107,114,128,.1); color:var(--muted);   border:1px solid rgba(107,114,128,.25); }
.prog-wrap { display:flex; align-items:center; gap:6px; }
.prog-bar  { flex:1; height:7px; background:var(--border2); border-radius:4px; overflow:hidden; min-width:40px; }
.prog-fill { height:100%; border-radius:4px; transition:width .4s; }
.prog-num  { font-size:0.78rem; font-weight:700; white-space:nowrap; min-width:28px; text-align:left; }
.tag { display:inline-block; background:var(--surface2); border:1px solid var(--border2); border-radius:3px; padding:1px 6px; font-size:0.68rem; color:var(--muted); margin:1px; }
.tag.on { background:rgba(96,165,250,.1); color:var(--info); border-color:rgba(96,165,250,.3); }
.tag.warn { background:rgba(251,191,36,.08); color:var(--warning); border-color:rgba(251,191,36,.25); }
.mono { font-family:monospace; font-size:0.72rem; color:#94a3b8; }
.lr-time { font-size:0.72rem; font-weight:600; color:var(--text); }
.lr-msg  { font-size:0.68rem; color:var(--muted); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width:200px; }
.lr-msg.ERR  { color:var(--error); }
.lr-msg.WARN { color:var(--warning); }
/* ── Mobile cards ── */
#cards-wrap { display:none; }
.card { border-radius:14px; margin-bottom:12px; overflow:hidden; border:1px solid var(--border2); }
.card-header { padding:14px 16px 12px; display:flex; align-items:center; justify-content:space-between; border-bottom:1px solid var(--border2); }
.card-name { display:flex; align-items:center; gap:9px; font-size:1.1rem; font-weight:800; }
.card-dot { width:12px; height:12px; border-radius:50%; flex-shrink:0; }
.card-url { font-size:0.65rem; color:var(--muted); margin-top:3px; }
.card-body { padding:4px 16px 14px; }
.card-sec { font-size:0.65rem; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; color:var(--dim); padding:10px 0 3px; }
.card-row { display:flex; justify-content:space-between; align-items:center; padding:5px 0; border-bottom:1px solid var(--border); gap:8px; }
.card-row:last-child { border-bottom:none; }
.card-lbl { font-size:0.72rem; color:var(--muted); white-space:nowrap; }
.card-val { font-size:0.78rem; text-align:left; }
.card-prog { display:flex; align-items:center; gap:8px; width:100%; }
.card-prog-bar { flex:1; height:8px; background:var(--border2); border-radius:4px; overflow:hidden; }
.card-prog-fill { height:100%; border-radius:4px; transition:width .4s; }
.card-prog-num { font-size:0.82rem; font-weight:700; white-space:nowrap; }
.card-lr-time { font-size:0.72rem; font-weight:600; color:var(--text); }
.card-lr-msg { font-size:0.68rem; color:var(--muted); word-break:break-word; }
.card-lr-msg.ERR { color:var(--error); }
.card-lr-msg.WARN { color:var(--warning); }
@media (max-width: 640px) {
  html, body { height:auto; }
  #app { height:auto; min-height:100vh; padding:10px 10px 16px; }
  #tbl-wrap { display:none; }
  #cards-wrap { display:block; }
  .hdr-right { flex-direction:column; align-items:flex-end; gap:2px; }
}
</style>
</head>
<body>
<div id="app">
  <header>
    <h1>דשבורד פרודוקציות ביטוח</h1>
    <div class="hdr-right">
      <span>עודכן: 2026-04-20 13:30:12</span>
      <span class="refresh-note">מתרענן אוטומטית כל 2 דקות</span>
    </div>
  </header>
  <div id="tbl-wrap">
    <table id="main-table">
      <colgroup>
        <col class="label-col">
        <col class="data-col"><col class="data-col">
        <col class="data-col"><col class="data-col"><col class="data-col">
      </colgroup>
      <thead id="thead"></thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
  <div id="cards-wrap"></div>
</div>
<script>
const RAW = {"companies": {"harel": {"name": "הראל", "color": "#023e8a", "status": "PARTIAL", "downloaded": 3, "target": 6, "month": "2026-04", "schedule": ["10", "20"], "run_time": "07:30", "next_run": "10/05/2026", "otp_method": "ntfy.sh (אוטומטי)", "vpn": false, "plan_t": true, "all_files": 9, "username": "sxv012173", "login_url": "https://agents.harel-group.co.il/my.policy", "last_run": {"timestamp": "2026-04-20 10:29:00", "level": "INFO", "message": "הסתיים — סך הכל הורדו 3 קבצים."}}, "clal": {"name": "כלל ביטוח", "color": "#1b4332", "status": "COMPLETE", "downloaded": 2, "target": 2, "month": "2026-04", "schedule": ["10", "20"], "run_time": "07:30", "next_run": "10/05/2026", "otp_method": "ntfy.sh (אוטומטי)", "vpn": false, "plan_t": true, "all_files": 4, "username": "25059445", "login_url": "https://data.clal.co.il/he/frmLogin.aspx", "last_run": {"timestamp": "2026-04-20 10:29:51", "level": "INFO", "message": "הסתיים — הורדו 2 קבצים החודש."}}, "menora": {"name": "מנורה", "color": "#7b2d8b", "status": "COMPLETE", "downloaded": 2, "target": 2, "month": "2026-04", "schedule": ["10", "20"], "run_time": "07:30", "next_run": "10/05/2026", "otp_method": "ntfy.sh (אוטומטי)", "vpn": false, "plan_t": true, "all_files": 4, "username": "E6NCIFKR", "login_url": "https://menoranet.menora.co.il/", "last_run": {"timestamp": "2026-04-20 11:29:13", "level": "INFO", "message": "הסתיים — הורדו 2 קבצים החודש."}}, "phoenix": {"name": "הפניקס", "color": "#e85d04", "status": "COMPLETE", "downloaded": 2, "target": 2, "month": "2026-04", "schedule": ["10", "20"], "run_time": "07:30", "next_run": "10/05/2026", "otp_method": "ntfy.sh (אוטומטי)", "vpn": true, "plan_t": true, "all_files": 8, "username": "025059445", "login_url": "https://sfe.fnx.co.il/SFE/Logon.aspx?ReturnUrl=%2fSFE%2ffiles.aspx", "last_run": {"timestamp": "2026-04-20 10:32:38", "level": "INFO", "message": "אין קבצים חדשים החודש — הסקריפט ינסה שוב בתאריך הבא."}}, "hachshara": {"name": "הכשרה", "color": "#0e7490", "status": "PENDING", "downloaded": 0, "target": 1, "month": "2026-04", "schedule": ["10", "20"], "run_time": "07:30", "next_run": "10/05/2026", "otp_method": "Microsoft Graph (אוטומטי)", "vpn": false, "plan_t": true, "all_files": 1, "username": "—", "login_url": "", "last_run": {"timestamp": "2026-04-20 11:47:46", "level": "INFO", "message": "כל הקבצים של החודש כבר הורדו בעבר."}}}, "updated_at": "2026-04-20 13:30:12", "order": ["harel", "clal", "menora", "phoenix", "hachshara"]};
const data = RAW.companies;
const order = RAW.order;

const STATUS_LABELS = {
  COMPLETE: '✓ הושלם', PARTIAL: '⏳ חלקי',
  ERROR: '✕ שגיאה', PENDING: '— ממתין'
};

function domainOf(url) {
  try { return new URL(url).hostname; } catch { return url; }
}

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return [r,g,b];
}

function renderHead() {
  let h = '<tr><th class="label-th"></th>';
  for (const k of order) {
    const c = data[k];
    const [r,g,b] = hexToRgb(c.color);
    const bright = `rgb(${Math.min(255,r+130)},${Math.min(255,g+130)},${Math.min(255,b+130)})`;
    h += `<th style="border-top:3px solid ${c.color};background:linear-gradient(180deg,rgba(${r},${g},${b},0.22) 0%,rgba(${r},${g},${b},0.07) 100%)">
      <div class="th-inner">
        <div class="th-name" style="color:${bright}">
          <span class="company-dot" style="background:${c.color};box-shadow:0 0 8px ${c.color}"></span>${c.name}
        </div>
        <div class="th-url">${domainOf(c.login_url||'')}</div>
      </div></th>`;
  }
  document.getElementById('thead').innerHTML = h + '</tr>';
}

function getColStyle(k) {
  const [r,g,b] = hexToRgb(data[k].color);
  return `style="border-right:2px solid rgba(${r},${g},${b},0.3)"`;
}

function get(fn) { return order.map(k => `<td ${getColStyle(k)}>${fn(data[k])}</td>`).join(''); }

function sec(label) {
  return `<tr class="sec"><td colspan="5">${label}</td></tr>`;
}
function row(label, cells) {
  return `<tr><td class="label">${label}</td>${cells}</tr>`;
}

function prog(c) {
  const pct = c.target > 0 ? Math.min(100, Math.round(c.downloaded/c.target*100)) : 0;
  return `<div class="prog-wrap">
    <div class="prog-bar"><div class="prog-fill" style="width:${pct}%;background:${c.color};box-shadow:0 0 6px ${c.color}80"></div></div>
    <span class="prog-num">${c.downloaded}/${c.target}</span>
  </div>`;
}

function lrCell(c) {
  const lr = c.last_run || {};
  if (!lr.timestamp) return '<span style="color:var(--muted)">—</span>';
  const cls = lr.level==='ERROR' ? 'ERR' : lr.level==='WARNING' ? 'WARN' : '';
  return `<div class="lr-time">${lr.timestamp}</div>
          <div class="lr-msg ${cls}" title="${lr.message||''}">${lr.message||'—'}</div>`;
}

function renderBody() {
  let b = '';
  b += sec('פרמטרים');
  b += row('שם משתמש',   get(c => `<span class="mono">${c.username}</span>`));
  b += row('שיטת OTP',   get(c => c.otp_method));
  b += row('VPN / Plan T', get(c => {
    return `<span class="tag ${c.vpn?'on':''}">${c.vpn?'✓':'✗'} VPN</span>`
         + `<span class="tag ${c.plan_t?'on':''}">${c.plan_t?'✓':'✗'} Plan T</span>`;
  }));
  b += sec('תנאים');
  b += row('יעד חודשי',  get(c => `<b>${c.target}</b> קבצים`));
  b += row('ימי הרצה',   get(c => c.schedule.length
    ? c.schedule.map(d=>`<span class="tag on">${d}</span>`).join('')
    : '<span class="tag warn">ידני</span>'));
  b += row('שעת הרצה',   get(c => `<span class="mono">${c.run_time}</span>`));
  b += row('ריצה הבאה',  get(c => {
    if (!c.next_run || c.next_run==='ידני') return '<span class="tag warn">ידני</span>';
    return `<b>${c.next_run}</b> <span style="color:var(--muted);font-size:.68rem">${c.run_time}</span>`;
  }));
  b += row('קבצים כולל', get(c => `<span style="color:var(--muted)">${c.all_files}</span>`));
  b += sec('סטטוס');
  b += row('התקדמות',    get(c => prog(c)));
  b += row('סטטוס',      get(c => `<span class="badge ${c.status}">${STATUS_LABELS[c.status]||c.status}</span>`));
  b += row('ריצה אחרונה',get(c => lrCell(c)));
  document.getElementById('tbody').innerHTML = b;
}

function cRow(lbl, val) {
  return `<div class="card-row"><span class="card-lbl">${lbl}</span><span class="card-val">${val}</span></div>`;
}

function renderCards() {
  let html = '';
  for (const k of order) {
    const c = data[k];
    const [r,g,b] = hexToRgb(c.color);
    const bright = `rgb(${Math.min(255,r+130)},${Math.min(255,g+130)},${Math.min(255,b+130)})`;
    const pct = c.target > 0 ? Math.min(100, Math.round(c.downloaded/c.target*100)) : 0;
    const lr = c.last_run || {};
    const lrCls = lr.level==='ERROR' ? 'ERR' : lr.level==='WARNING' ? 'WARN' : '';
    const sched = c.schedule.length
      ? c.schedule.map(d=>`<span class="tag on">${d}</span>`).join('')
      : '<span class="tag warn">ידני</span>';
    const nextRun = c.next_run && c.next_run!=='ידני'
      ? `<b>${c.next_run}</b>`
      : '<span class="tag warn">ידני</span>';
    html += `<div class="card" style="border-color:rgba(${r},${g},${b},0.4)">
      <div class="card-header" style="background:linear-gradient(135deg,rgba(${r},${g},${b},0.25) 0%,rgba(${r},${g},${b},0.08) 100%)">
        <div>
          <div class="card-name" style="color:${bright}">
            <span class="card-dot" style="background:${c.color};box-shadow:0 0 8px ${c.color}"></span>${c.name}
          </div>
          <div class="card-url">${domainOf(c.login_url||'')}</div>
        </div>
        <span class="badge ${c.status}">${STATUS_LABELS[c.status]||c.status}</span>
      </div>
      <div class="card-body">
        <div class="card-sec">התקדמות</div>
        <div class="card-row">
          <div class="card-prog">
            <div class="card-prog-bar"><div class="card-prog-fill" style="width:${pct}%;background:${c.color};box-shadow:0 0 6px ${c.color}80"></div></div>
            <span class="card-prog-num">${c.downloaded}/${c.target}</span>
          </div>
        </div>
        <div class="card-sec">ריצה אחרונה</div>
        <div class="card-row"><div><div class="card-lr-time">${lr.timestamp||'—'}</div>${lr.message?`<div class="card-lr-msg ${lrCls}">${lr.message}</div>`:''}</div></div>
        <div class="card-sec">פרמטרים</div>
        ${cRow('שם משתמש', `<span class="mono">${c.username}</span>`)}
        ${cRow('שיטת OTP', c.otp_method)}
        ${cRow('VPN / Plan T', `<span class="tag ${c.vpn?'on':''}">${c.vpn?'✓':'✗'} VPN</span><span class="tag ${c.plan_t?'on':''}">${c.plan_t?'✓':'✗'} Plan T</span>`)}
        <div class="card-sec">תנאים</div>
        ${cRow('יעד חודשי', `<b>${c.target}</b> קבצים`)}
        ${cRow('ימי הרצה', sched)}
        ${cRow('שעת הרצה', `<span class="mono">${c.run_time}</span>`)}
        ${cRow('ריצה הבאה', nextRun)}
        ${cRow('קבצים כולל', `<span style="color:var(--muted)">${c.all_files}</span>`)}
      </div>
    </div>`;
  }
  document.getElementById('cards-wrap').innerHTML = html;
}

renderHead();
renderBody();
renderCards();
</script>
</body>
</html>
